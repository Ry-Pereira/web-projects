<!-- Tells the browser what html version that is used for coding-->
<!DOCTYPE html>
<!--Setting the language of the page to English-->
<html lang="en">
    <!-- The head section contains meta information and links to external resources -->
    <head>
        <!--Meta tags for responsive design setting the viewport -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--Meta tag for character encoding -->
        <meta charset="UTF-8">
        <!--Link to external stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Title tag for the web page title-->
        <title>Motivational Poster</title>
    </head>
    <!-- The body tag contains the visible content of the web page -->
    <body>
        <!-- Container for the motivational content -->
        <div id="container">
        <!-- Image for the motivational poster -->
        <img src="images/hands-in-night-sky-picture.jpg" alt="Hands in Night Sky">
        <!-- Header 1 that displays the main motivational message -->
        <h1> TOUCH THE STARS</h1>
        <h2>Don’t just admire the sky—be bold enough to reach into it.</h2>
        </div>
    </body>
</html>
