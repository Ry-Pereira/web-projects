<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element with English language specified -->
<html lang="en">
    <!-- Contains metadata and document settings -->
    <head>
        <!-- Sets the character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Links the external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Sets the title displayed in the browser tab -->
        <title>Basic Stopwatch</title>
    </head>
    <!-- Contains all visible content on the webpage -->
    <body>
        <!-- Main heading of the page -->
        <h1 id="time_display">00:00:00:00</h1>
     
        <button id="start_button" type="button" class="buttons">START</button>
        <button id="pause_button" type="button" class="buttons">PAUSE</button>
        <button id="lap_button" type="button" class="buttons">LAP</button>
        <button id="restart_button" type="button" class="buttons">RESTART</button>
        <button id="dark_mode_toggle_button" type="button" class="buttons">DARKEN</button>
        
        <div id="laps_container">

        </div>
        

        
        <!-- Links the external JavaScript file -->
        <script src="script.js"></script>
    </body>
</html>
