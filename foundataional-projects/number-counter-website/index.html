<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element with English language specified -->
<html lang="en">
    <!-- Contains metadata and document settings -->
    <head>
        <!-- Sets the character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Links the external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Sets the title displayed in the browser tab -->
        <title>Number Counter</title>
    </head>
    <!-- Contains all visible content on the webpage -->
    <body>
        <!-- Main heading of the page -->
        <h1>Number Counter</h1>
        <!-- Container that holds the counter and buttons -->
        <div id="div_box">
            <!-- Displays the current counter value -->
            <h2 id="numberCounter">0</h2>
            <!-- Button used to decrease the counter value -->
            <button id="decrease_button" class="button">Decrease</button>
            <!-- Button used to reset the counter value -->
            <button id="reset_button" class="button">Reset</button>
            <!-- Button used to increase the counter value -->
            <button id="increase_button" class="button">Increase</button>
        </div>
        <!-- Links the external JavaScript file -->
        <script src="script.js"></script>
    </body>
</html>
