<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element with English language specified -->
<html lang="en">
    <!-- Contains metadata and document settings -->
    <head>
        <!-- Sets the character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Links the external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Sets the title displayed in the browser tab -->
        <title>Dice Roller</title>
    </head>
    <!-- Contains all visible content on the webpage -->
    <body>
        <!-- Audio element used to play the dice rolling sound effect -->
        <audio id="dice_rolling_sound">
            <!-- Audio source file for the dice rolling sound -->
            <source src="audio/dice-rolling-sound.mp3">
        </audio>
        <!-- Form container for the dice roller controls -->
        <form>
            <!-- Main heading displayed at the top of the page -->
            <h1>Dice Roller</h1>
            <!-- Label describing the dice quantity input field -->
            <label># Of Dice: </label>
            <!-- Input field where users enter how many dice to roll -->
            <input type="number" id="dice_quantity" placeholder="1" min="1" max="16">
            <!-- Button that triggers the dice rolling function -->
            <button type="button" id="roll_dice_button">Roll Dice</button>
            <!-- Heading used to display the rolled dice values -->
            <h2 id="dice_value_display">Dice: </h2>
            <!-- Container where dice images will be dynamically displayed -->
            <div id="dice_images_container">
            </div>
        </form>
        <!-- Links the external JavaScript file that controls page functionality -->
        <script src="script.js"></script>
    </body>
</html>
