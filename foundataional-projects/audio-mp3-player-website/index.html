<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element with English language specified -->
<html lang="en">
    <!-- Contains metadata and document settings -->
    <head>
        <!-- Sets the character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Links the external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Sets the title displayed in the browser tab -->
        <title>MP3 Player</title>
    </head>
    <!-- Contains all visible content on the webpage -->
    <body>
        <!-- Main heading of the page -->
        <div id="mp3_player_container">
            <h1 id="song_name_container">Song Name</h1>
            <div id="image_container">
            </div>
            <div id="button_container">

                <button type="button" id="minus_button">-</button>
                <button type="button" id="plus_button">+</button>
                <br>
                
                <button type="button" id="next_button">⏮</button>
                <button type="button" id="pause_button">⏯</button>
                <button type="button" id="previous_button">⏭</button>
             
                
                
                

            </div>
        </div>
        <!-- Links the external JavaScript file -->
        <script src="script.js"></script>
    </body>
</html>
