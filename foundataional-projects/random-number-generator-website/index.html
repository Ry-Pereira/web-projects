<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element with English language specified -->
<html lang="en">
    <!-- Contains metadata and document settings -->
    <head>
        <!-- Sets the character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Links the external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Sets the title displayed in the browser tab -->
        <title>Random Number Generator</title>
    </head>
    <!-- Contains all visible content on the webpage -->
    <body>
        <!-- Main heading of the page -->
        <h1>Random Number Generator(1-100)</h1>
        <!-- Container for displaying the generated number and the button to generate a new number -->
        <div id="numberDisplayContainer">
            <!-- Container for the generated number display -->
            <h2 id="numberDisplay">Number: </h2>
            <!-- Button to trigger random number generation -->
            <button id="generateNumberBtn">Generate Random Number</button>
        </div>
        <!-- Links the external JavaScript file -->
        <script src="script.js"></script>
    </body>
</html>
