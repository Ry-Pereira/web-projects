<!-- Declares the document type as HTML5 -->
<!DOCTYPE html>
<!-- Root HTML element with English language specified -->
<html lang="en">
    <!-- Contains metadata and document settings -->
    <head>
        <!-- Sets the character encoding to UTF-8 -->
        <meta charset="UTF-8">
        <!-- Makes the page responsive on different screen sizes -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Links the external CSS stylesheet -->
        <link rel="stylesheet" href="styles.css">
        <!-- Sets the title displayed in the browser tab -->
        <title>Number Guessing Game</title>
    </head>
    <!-- Contains all visible content on the webpage -->
    <body>
        <!-- Main heading of the page -->
        <h1>Number Guessing Game</h1>
        <!-- Subheading with instructions for the game -->
        <h2>Guess a number between 1 and 100!</h2>
        <!-- Container for the game elements -->
        <div id="gameContainer">
            <!-- Paragraph to display the number of attempts -->
            <p id="attemptNumber">Attempts: 0</p>
            <!-- Paragraph to provide feedback on the user's guess -->
            <p id="guessFeedback">Please enter your guess:</p>
            <!-- Input field for the user to enter their guess, restricted to numbers between 1 and 100 -->
            <input type="number" id="guessInput" min="1" max="100">
            <!-- Button to submit the user's guess -->
            <button id="submitGuess">Submit Guess</button>
        </div>
        <!-- Links the external JavaScript file -->
        <script src="script.js"></script>
    </body>
</html>
