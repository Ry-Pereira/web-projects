<!-- Tells the browser what html version that is sued for coding-->
<!DOCTYPE html>
<!--Setting the language of the page to English-->
<html lang="en">
    <!-- The head section contains meta information and links to external resources -->
    <head>
        <!--Meta tags for responsive design setting the viewport -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!--Meta tag for the page title -->
        <title>Learn Colors in Japanese</title>
        <!--Link to the external CSS file -->
        <link rel="stylesheet" href = "styles.css">
    </head>
    <!-- The body section contains the visible content of the page -->
    <body>
        <!-- Setting the main heading -->
        <h1>日本語で「Learn Colors in Japanese」は</h1>
        <!-- Setting a break element to provide a break space-->
        <br>

        <!--Setting the heading for the red color, with id set, and draggable set to true-->
        <h2 id ="red" draggable="true">Aka	赤 - Red</h2>
        <!--Setting the image to a red image png with class and src set to image address-->
        <img class = "images" src="images/red.png" alt="Aka	赤 - Red">
        <!--Setting the heading for the orange color, with id set, and draggable set to true-->
        <h2 id = "orange" draggable="true">Daidai, Orenji 橙、オレンジ - Orange</h2>
        <!--Setting the image to a orange image png with class and src set to image address-->
        <img class = "images" src="images/orange.png" alt="Daidai, Orenji 橙、オレンジ - Orange">
        <!--Setting the heading for the yellow color, with id set, and draggable set to true-->
        <h2 id = "yellow" draggable="true">Ki	黄 - Yellow</h2>
        <!--Setting the image to a yellow image png with class and src set to image address-->
        <img class = "images" src="images/yellow.png" alt="Ki	黄 - Yellow">
        <!--Setting the heading for the green color, with id set, and draggable set to true-->
        <h2 id = "green" draggable="true">Midori	緑 - Green</h2>
        <!--Setting the image to a green image png with class and src set to image address-->
        <img class = "images" src="images/green.png" alt="Midori	緑 - Green">
        <!--Setting the heading for the blue color, with id set, and draggable set to true-->
        <h2 id = "blue" draggable="true">Ao	青 - Blue</h2>
        <!--Setting the image to a blue image png with class and src set to image address-->
        <img class = "images" src="images/blue.png" alt="Ao	青 - Blue">

        

    </body>


</html>
