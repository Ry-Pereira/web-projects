<!--This is a simple HTML page that provides information about me, including my name, a brief description, my skills, and a calming image of a rainy field. The page is designed to be responsive and user-friendly, showcasing my web development skills. -->
<!DOCTYPE html>
<!--This declaration defines this document as an HTML5 document. It helps the browser to render the page correctly. -->
<html lang ="en">
    <!--This element is the root element of an HTML page. The lang attribute specifies the language of the document, which is English in this case. -->
    <head>
        <!--The head element contains meta-information about the document, such as the title and character encoding. -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" charset ="UTF-8">
        <!--The title element specifies the title of the document, which is displayed in the browser's title bar or tab. -->
        <title>About Me</title>
    </head>
    <!--The body element contains the content of the document, such as text, images, and links. -->
    <body>
        <!-- The heading 1 element shows the first heading of the page -->
        <h1>About Me</h1>
        <!-- A break element was used to provide a break space-->
        <br>
        <!-- The heading 2 element shows the second heading of the page , the name of the author-->
        <h2>Name: Ryan Pereira</h2>
        <!-- The paragraph element shows a brief description of the author -->
        <p>I am a passionate web developer with experience in creating responsive and user-friendly websites.</p>
        <!-- Another break element was used to provide a break space -->
        <br>
        <!-- The heading 3 element shows the third heading of the page, the skills section -->
        <h3>Skills:</h3>
        <!-- An unordered list element was used to list the skills of the author -->
        <ul>
            <!-- List items for each skill -->
            <li>Coding</li>
            <!-- List items for each skill -->
            <li>Design</li>
            <!-- List items for each skill -->
            <li>Problem Solving</li>
        </ul>
        <!-- A break element was used to provide a break space -->
        <br>
        <!-- The heading 3 element shows the third heading of the page, the interests section -->
        <h3>Heres a rainy field. For calmness...</h3>
        <!-- An image element was used to display the calming image -->
        <img src ="images/rainy_day.gif" alt="A rainy day">
        <!-- A break element was used to provide a break space -->
        <br>
        <!-- A link element was used to provide a link to the image location -->
        <a href = "https://i.pinimg.com/originals/01/d8/52/01d85241578210bd5e4d1609d869b774.gif">Click here for the image location</a>

    </body>

</html>
